services:
  tutorials-jupyterhub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    image: vector-modelling-tutorial-hub:latest
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - tutorials-hub-data:/srv/jupyterhub
      - tutorials-user-data:/srv/jupyter
      - ./jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/srv/shared:ro
    secrets:
      - hub_env
    networks: [jhub]

  tutorials-nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - tutorials-jupyterhub
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt:ro
    networks: [jhub]

  tutorials-singleuser:
    build:
      context: .
      dockerfile: Dockerfile.singleuser
    image: vector-modelling-tutorial-user:latest
    profiles: ["build"]

  tutorials-viewer:
    build:
      context: .
      dockerfile: Dockerfile.viewer
    container_name: vector-modelling-tutorial-viewer
    expose:
      - "8080"
    volumes:
      - ./tutorials:/srv/tutorials:ro
      - ./veclim_templates:/srv/templates:ro
    networks: [jhub]

networks:
  jhub: {}

volumes:
  tutorials-hub-data:
  tutorials-user-data:

secrets:
  hub_env:
    file: ./.env
    # file: /srv/jupyterhub/secrets/.env