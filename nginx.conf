server {
  listen 80;
  server_name _;

  # If uploads can be big (e.g., notebooks, data)
  client_max_body_size 256m;
  proxy_read_timeout 86400;

  # Serve static HTML tutorials directly via the Hub container
  location /tutorials-viewer/ {
    proxy_pass http://tutorials-jupyterhub:8000/tutorials-viewer/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /tutorials/ {
    proxy_pass http://tutorials-jupyterhub:8000/tutorials/;
    proxy_http_version 1.1;

    # Preserve host and client IP chain
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    # Trust the proto from the OUTER proxy if it sets it (https/http)
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSockets
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    # Avoid buffering WS traffic
    proxy_buffering off;
  }

  # redirect root to /tutorials
  location = / {
    return 302 https://$host/tutorials/;
  }
}
