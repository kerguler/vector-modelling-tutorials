upstream tutorials_hub { 
  server tutorials-jupyterhub:8000; 
  keepalive 32; 
}

upstream tutorials_viewer {
    server tutorials-viewer:8080;
    keepalive 32;
}

server {
  listen 80;
  server_name _;

  # If uploads can be big (e.g., notebooks, data)
  client_max_body_size 256m;
  proxy_read_timeout 86400;

  # Serve static assets
  location /tutorials-viewer/static/ {
    proxy_pass http://tutorials_viewer/static/;
    include proxy_params;
  }

  # Serve notebooks without showing /localfile/
  location /tutorials-viewer/ {
    rewrite ^/tutorials-viewer/(.*)$ /localfile/$1 break;
    proxy_pass http://tutorials_viewer/;
    include proxy_params;
  }

  location /tutorials/ {
    proxy_pass http://tutorials-jupyterhub:8000/tutorials/;
    proxy_http_version 1.1;

    # Preserve host and client IP chain
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    # Trust the proto from the OUTER proxy if it sets it (https/http)
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSockets
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    # Avoid buffering WS traffic
    proxy_buffering off;
  }

  # redirect root to /tutorials
  location = / {
    return 302 https://$host/tutorials/;
  }
}
